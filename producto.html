<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | SugarRush</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html">
                <img src="img/logor.png" alt="Logo SugarRush" class="logo">
            </a>
            <nav>
                <a href="login.html">Cerrar Sesión</a>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-family: var(--fuente-titulos);">Inventario de Snacks</h2>
            <a href="nuevoProducto.html" class="formulario__btn" style="width: auto;">+ Nuevo Producto</a>
        </div>

        <div style="overflow-x: auto; background: white; border-radius: 8px; margin-top: 20px;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-inventario">
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/Productos.js"></script>
</body>
</html>
