<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SugarRush</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html">
                <img src="img/logor.png" alt="Logo SugarRush" class="logo">
            </a>
            <nav>
                <a href="index.html">Volver</a>
            </nav>
        </div>
    </header>

    <form class="formulario">
        <h2>Acceso al Panel</h2>
        <div class="formulario__grupo">
            <label class="formulario__label">Usuario</label>
            <input type="text" class="formulario__input" required>
        </div>
        <div class="formulario__grupo">
            <label class="formulario__label">Contraseña</label>
            <input type="password" class="formulario__input" required>
        </div>
        <button type="button" class="formulario__btn" onclick="location.href='producto.html'">Ingresar</button>
    </form>

    <script src="js/app.js"></script>
</body>
</html>
