<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SugarRush Imports | Inicio</title>
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        
        #gridProductos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .tarjeta {
            border: 1px solid #eee;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .tarjeta img {
            max-width: 100%;
            height: 200px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <header style="background-color: #F15A24; padding: 20px; color: white;">
        <nav style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: auto;">
            <div class="logo">
                <img src="img/logo.png" alt="SugarRush Logo" style="height: 80px;">
            </div>
            <ul style="display: flex; list-style: none; gap: 20px;">
                <li><a href="index.html" style="color: white; text-decoration: none;">Inicio</a></li>
                <li><a href="carrito.html" style="color: white; text-decoration: none;">Carrito</a></li>
                <li><a href="login.html" style="color: white; text-decoration: none;">Administrador</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 1200px; margin: 20px auto; padding: 0 20px;">
        
        <div style="text-align: center; margin-bottom: 40px;">
            <input type="text" id="buscador" placeholder="¿Qué se te antoja hoy?" 
                   style="width: 100%; max-width: 600px; padding: 12px; border-radius: 25px; border: 1px solid #ccc;">
        </div>

        <h2 class="titulo-seccion">Catálogo de Dulces</h2>

        <div id="gridProductos">
            <p style="text-align: center; grid-column: 1/-1;">Cargando productos desde la base de datos...</p>
        </div>

    </main>

    <footer style="background-color: #222; color: white; text-align: center; padding: 20px; margin-top: 40px;">
        <p>&copy; 2026 SugarRush Imports</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
