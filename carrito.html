<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | SugarRush</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html">
                <img src="img/logor.png" alt="Logo SugarRush" class="logo">
            </a>
            <nav>
                <a href="index.html">Seguir Comprando</a>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <h2 style="font-family: var(--fuente-titulos); margin-bottom: 20px;">Tu Carrito de Compras</h2>
        
        <div id="carrito-list">
        </div>

        <div style="text-align: right; margin-top: 30px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <h3 style="margin-top: 0; font-family: var(--fuente-titulos);">Total: <span id="carrito-total" class="precio-txt" style="display: inline; margin-left: 10px;">L. 0.00</span></h3>
            <a href="pagar.html" class="formulario__btn" style="width: auto; padding: 12px 30px; margin-top: 15px; font-size: 16px;">Proceder al Pago</a>
        </div>
    </main>

    <footer>
        <p style="text-align: center; color: white;">&copy; 2026 SugarRush. Todos los derechos reservados.</p>
    </footer>

    <script src="js/carrito.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', mostrarCarrito);
    </script>
</body>
</html>
