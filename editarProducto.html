<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Snack | SugarRush</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html">
                <img src="img/logor.png" alt="Logo SugarRush" class="logo">
            </a>
        </div>
    </header>
    <form class="formulario" onsubmit="actualizarProducto(event)">
        <h2>Editar Snack</h2>
        <div class="formulario__grupo">
            <label class="formulario__label">Nombre del Producto</label>
            <input type="text" id="edit-nom" class="formulario__input" required>
        </div>
        <div class="formulario__grupo">
            <label class="formulario__label">Descripción</label>
            <textarea id="edit-desc" class="formulario__input" style="height: 80px; resize: none;" required></textarea>
        </div>
        <div class="formulario__grupo">
            <label class="formulario__label">Precio Venta</label>
            <input type="number" step="0.01" id="edit-pre" class="formulario__input" required>
        </div>
        <div class="formulario__grupo">
            <label class="formulario__label">Imagen (.png, .jpg)</label>
            <input type="file" id="edit-img" accept=".png, .jpg, .webp" class="formulario__input">
        </div>
        <div class="formulario__grupo">
            <label class="formulario__label">Estado</label>
            <select class="formulario__input">
                <option>Activo</option>
                <option>Inactivo</option>
            </select>
        </div>
        <button type="submit" class="formulario__btn">Guardar Cambios</button>
        <p style="text-align: center; margin-top: 15px;"><a href="producto.html" style="color: #444; text-decoration: none;">Volver al listado</a></p>
    </form>
    <script src="js/editarProducto.js"></script>
</body>
</html>
